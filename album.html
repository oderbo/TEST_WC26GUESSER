<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<title>Sticker Album</title>
<style>
/* --- OFFIZIELLE TURNIER-SCHRIFT EINBINDEN --- */
@font-face {
    font-family: 'FWC2026';
    src: url('assets/FWC2026.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

* {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}

html, body {
    overflow: hidden; 
    height: 100dvh; 
    text-size-adjust: none;
    -webkit-text-size-adjust: none;
}

body { 
    margin: 0; 
    padding: 10px 6px; 
    font-family: 'FWC2026', Arial, sans-serif; 
    color: white; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    width: 100%;
    background-color: #3f57f5; 
    position: relative; 
}

/* --- OBERE LEISTE --- */
.header-container {
    width: 100%; max-width: 1400px; position: relative; 
    display: flex; justify-content: center; align-items: center;
    margin-top: -20px; margin-bottom: 0px; height: 50px; flex-shrink: 0; 
}

h1 { 
    margin: 0; font-size: 22px; text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4); letter-spacing: 1px; text-align: center;
}

.btn-back {
    position: absolute; left: 4px; top: 50%; transform: translateY(-50%); 
    background: rgba(255, 255, 255, 0.1); border: 1.5px solid rgba(255, 255, 255, 0.4);
    color: white; font-family: Arial, sans-serif; font-weight: bold;
    font-size: 14px; width: 22px; height: 22px; border-radius: 4px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    text-decoration: none; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    transition: background 0.15s ease, transform 0.15s ease; z-index: 100; 
}
.btn-back:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-50%) scale(1.05); }

/* --- MARKT-BUTTON (UNTEN LINKS) --- */
.action-btn-round {
    position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px;
    border-radius: 50%; background-color: #ffffff; display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 6px 16px rgba(0,0,0,0.3); z-index: 1000; padding: 0;
    border: 2px solid #ffbb04; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.action-btn-round:hover { transform: scale(1.1); }
.action-btn-round img { width: 55%; height: 55%; object-fit: contain; display: block; }

/* =========================================================================
   STICKER-STAPEL (UNTEN RECHTS)
   ========================================================================= */
.sticker-stack-container {
    position: fixed; bottom: 20px; right: 20px;
    width: 80px; height: 110px; 
    z-index: 1000; cursor: pointer;
    transition: transform 0.2s ease;
}
.sticker-stack-container:hover { transform: translateY(-5px); }

.stack-card {
    position: absolute; width: 100%; height: 100%;
    background-color: #eeeeee; border: 2px solid #ffffff;
    border-radius: 4px; box-shadow: 0 4px 8px rgba(0,0,0,0.4);
    display: flex; align-items: center; justify-content: center;
}
.stack-card-3 { transform: rotate(8deg) translate(3px, 3px); z-index: 1; background-color: #dddddd; }
.stack-card-2 { transform: rotate(-5deg) translate(-2px, 1px); z-index: 2; background-color: #e5e5e5;}
.stack-card-1 { transform: rotate(0deg); z-index: 3; }

.stack-placeholder-text {
    font-family: Arial, sans-serif; font-size: 11px; font-weight: bold; color: #aaaaaa; text-transform: uppercase;
}

.stack-counter {
    position: absolute; top: -10px; right: -10px;
    background-color: #ff1145; color: #ffffff;
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: Arial, sans-serif; font-size: 13px; font-weight: bold;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 10;
}


/* =========================================================================
   3D ALBUM ENGINE
   ========================================================================= */
#album-content {
    width: 100%; flex-grow: 1; position: relative;
    display: flex; justify-content: center; align-items: center; 
    margin-top: -3vh; 
    perspective: 2500px;
}

.book {
    position: relative;
    width: 49vw; 
    aspect-ratio: 1 / 1.41;
    max-height: calc(100dvh - 200px);
    transform-style: preserve-3d;
    transform-origin: left center; 
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    transform: translateX(-20%) scale(1.4);
}

.book.open {
    transform: translateX(50%) scale(1);
}

@media (max-width: 767px) {
    .book.zoomed-left { transform: translateX(150%) translateY(-8vh) scale(2); }
    .book.zoomed-right { transform: translateX(-50%) translateY(-8vh) scale(2); }
}

.paper {
    position: absolute; width: 100%; height: 100%; top: 0; left: 0;
    transform-style: preserve-3d;
    transform-origin: left center;
    transition: transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
    will-change: transform; 
}

.paper.flipped { transform: rotateY(-180deg); }

.front, .back {
    position: absolute; width: 100%; height: 100%; top: 0; left: 0;
    backface-visibility: hidden; 
    background-color: #f4f1ea; 
    overflow: hidden;
}

.front { border-left: 1px solid rgba(0,0,0,0.25); }
.back { transform: rotateY(180deg); border-right: 1px solid rgba(0,0,0,0.25); }

.cover-img {
    width: 100%; height: 100%; object-fit: cover;
    border-radius: 0 8px 8px 0; 
}

.page-number {
    position: absolute; top: 6px; 
    font-size: 10px; font-weight: bold; color: #111111;
    background: rgba(255,255,255,0.7); 
    padding: 1px 4px; border-radius: 3px;
    min-width: 16px; text-align: center;
}
.page-number.left { left: 6px; }
.page-number.right { right: 6px; }

/* NEU: Dummy-Text für die Test-Phase */
.debug-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 80%; text-align: center; color: #555; font-family: Arial, sans-serif;
    font-size: 12px;
}
.debug-text span {
    display: block; font-size: 22px; font-weight: bold; color: #3f57f5; margin-bottom: 8px;
}

/* --- DESKTOP MINIMAL-PFEILE --- */
.desk-nav-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 42px; color: rgba(0, 0, 0, 0.35); 
    cursor: pointer; z-index: 1000; display: none; 
    font-family: sans-serif;
    transition: color 0.2s ease, opacity 0.3s ease; 
}
.desk-nav-btn span { display: inline-block; transform: scale(0.5, 2.5); }
.desk-nav-btn:hover { color: #000000; }

/* --- DESKTOP LAYOUT --- */
@media (min-width: 768px) {
    .header-container { margin-top: 15px; margin-bottom: 25px; height: 70px; }
    h1 { font-size: 36px; } 
    .btn-back { left: 0; width: 36px; height: 36px; font-size: 22px; border-radius: 6px; border-width: 2px; }
    .action-btn-round { width: 70px; height: 70px; bottom: 30px; left: 30px; }
    
    .sticker-stack-container { width: 130px; height: 180px; bottom: 30px; right: 30px; }
    .stack-placeholder-text { font-size: 14px; }
    .stack-counter { width: 32px; height: 32px; font-size: 15px; top: -12px; right: -12px; }
    
    .book {
        width: 440px; 
        max-height: calc(100dvh - 120px);
        transform: translateX(-15%) scale(1.25);
    }
    .book.open { transform: translateX(50%) scale(1); }
    
    .page-number { top: 12px; font-size: 14px; padding: 2px 6px; min-width: 24px; border-radius: 4px;}
    .page-number.left { left: 12px; }
    .page-number.right { right: 12px; }
    
    .debug-text { font-size: 16px; }
    .debug-text span { font-size: 28px; }

    .book.open ~ .desk-nav-btn { display: block; }
    .desk-nav-btn.prev { left: calc(50% - 440px + 5px); }
    .desk-nav-btn.next { left: calc(50% + 440px - 30px); }
}
</style>
</head>

/* =========================================================================
   3D BOOK ENGINE (Dynamischer Aufbau)
   ========================================================================= */
const book = document.getElementById('book');
let papers = [];
let currentPageIndex = 0; 
let maxPages = 0;

// Hilfsfunktion: Wandelt Blueprint-Daten in Text für den Dummy-Modus um
function getDebugHTML(bp) {
    if (!bp) return '';
    const pad = (n) => String(n).padStart(3, '0');
    if (bp.t === 'team') return `<span>Group ${bp.g}</span>${bp.n}<br>(${bp.id}${pad(bp.s)} - ${bp.id}${pad(bp.e)})`;
    if (bp.t === 'cover_back') return `<span>Backcover</span>`;
    if (bp.t === 'index') return `<span>Index</span>`;
    if (bp.t === 'stadiums') return `<span>Stadiums</span>(${bp.id}${pad(bp.s)} - ${bp.id}${pad(bp.e)})`;
    if (bp.t === 'special') return `<span>Special</span>`;
    if (bp.t === 'gboots') return `<span>Golden Boots</span>`;
    if (bp.t === 'gball') return `<span>Golden Ball</span>`;
    if (bp.t === 'winners') return `<span>Winning Teams</span>`;
    return '';
}

function initBook() {
    book.innerHTML = '';
    papers = [];
    
    // Wir brauchen 59 physische Papierblätter für 116 Seiten + Cover
    const totalPapers = Math.ceil(albumBlueprint.length / 2) + 1;

    // Wir erzeugen die Papiere. Das letzte Papier im DOM liegt optisch ganz oben!
    for (let i = 0; i < totalPapers; i++) {
        const paper = document.createElement('div');
        paper.className = 'paper';
        paper.id = `paper${i}`;

        const front = document.createElement('div');
        front.className = 'front';
        const back = document.createElement('div');
        back.className = 'back';

        // Paper 0 ist eine Ausnahme: Vorne ist das Cover, hinten ist Blueprint Seite 0
        if (i === 0) {
            front.innerHTML = `<img src="assets/panini_album.png" class="cover-img" onerror="this.src='assets/Icon.png'">`;
            back.innerHTML = `<div class="page-number left">0</div><div class="debug-text">${getDebugHTML(albumBlueprint[0])}</div>`;
        } else {
            // Normale Berechnung: Paper 1 = Front(1) & Back(2)
            const frontPageIndex = (i * 2) - 1;
            const backPageIndex = (i * 2);

            if (frontPageIndex < albumBlueprint.length) {
                front.innerHTML = `<div class="page-number right">${frontPageIndex}</div><div class="debug-text">${getDebugHTML(albumBlueprint[frontPageIndex])}</div>`;
            }
            if (backPageIndex < albumBlueprint.length) {
                back.innerHTML = `<div class="page-number left">${backPageIndex}</div><div class="debug-text">${getDebugHTML(albumBlueprint[backPageIndex])}</div>`;
            }
        }

        paper.appendChild(front);
        paper.appendChild(back);
        
        // Mit prepend schieben wir jedes neue Blatt UNTER das vorherige
        book.prepend(paper);
        // Ins Array packen wir es so, dass paper[0] wirklich das Cover ist
        papers.unshift(paper); 
    }

    maxPages = papers.length;
    
    papers.forEach((paper, index) => {
        paper.style.zIndex = maxPages - index;
    });
}

// Sofort beim Laden ausführen!
initBook();

function updateNavArrows() {
    const nextArrow = document.querySelector('.desk-nav-btn.next');
    if (nextArrow) {
        if (currentPageIndex >= maxPages - 1) {
            nextArrow.style.opacity = '0';
            nextArrow.style.pointerEvents = 'none';
        } else {
            nextArrow.style.opacity = '1';
            nextArrow.style.pointerEvents = 'auto';
        }
    }
}

book.addEventListener('click', (e) => {
    if (currentPageIndex === 0) {
        openBook();
        return;
    }
    
    if (window.innerWidth < 768) {
        const isZoomed = book.classList.contains('zoomed-left') || book.classList.contains('zoomed-right');
        if (!isZoomed) {
            const clickedLeftPage = e.target.closest('.back');
            const clickedRightPage = e.target.closest('.front');
            
            if (clickedLeftPage) {
                book.classList.add('zoomed-left');
            } else if (clickedRightPage) {
                book.classList.add('zoomed-right');
            }
        }
    }
});

function openBook() {
    book.classList.add('open');
    flipNext();
}

function flipNext() {
    if (currentPageIndex < maxPages - 1) {
        const paper = papers[currentPageIndex];
        paper.classList.add('flipped');
        
        setTimeout(() => {
            paper.style.zIndex = currentPageIndex + 1;
        }, 300);
        
        currentPageIndex++;
        updateNavArrows(); 
    }
}

function flipPrev() {
    if (currentPageIndex > 1) {
        currentPageIndex--;
        const paper = papers[currentPageIndex];
        paper.classList.remove('flipped');
        
        setTimeout(() => {
            paper.style.zIndex = maxPages - currentPageIndex;
        }, 300);
        updateNavArrows(); 

    } else if (currentPageIndex === 1) {
        currentPageIndex = 0;
        const paper = papers[0];
        paper.classList.remove('flipped');
        
        setTimeout(() => {
            paper.style.zIndex = maxPages;
        }, 300);
        
        book.classList.remove('open');
        updateNavArrows(); 
    }
}

/* =========================================================================
   TOUCH SWIPE LOGIC
   ========================================================================= */
let touchstartX = 0;
let touchstartY = 0;
let touchendX = 0;
let touchendY = 0;
let isDraggingSticker = false;

const albumContent = document.getElementById('album-content');

albumContent.addEventListener('touchstart', e => {
    if (e.target.closest('#stickerStack')) {
        isDraggingSticker = true;
        return;
    }
    isDraggingSticker = false;
    touchstartX = e.changedTouches[0].screenX;
    touchstartY = e.changedTouches[0].screenY;
});

albumContent.addEventListener('touchend', e => {
    if (isDraggingSticker) return;
    touchendX = e.changedTouches[0].screenX;
    touchendY = e.changedTouches[0].screenY;
    handleSwipe();
});

function handleSwipe() {
    if (!book.classList.contains('open')) return;
    
    const diffX = touchendX - touchstartX;
    const diffY = touchendY - touchstartY;
    const absDiffX = Math.abs(diffX);
    const absDiffY = Math.abs(diffY);
    
    const swipeThreshold = 40; 
    const isZoomed = book.classList.contains('zoomed-left') || book.classList.contains('zoomed-right');

    if (absDiffX > absDiffY) {
        if (absDiffX > swipeThreshold) {
            if (diffX < 0) {
                if (isZoomed) {
                    if (book.classList.contains('zoomed-left')) {
                        book.classList.remove('zoomed-left');
                        book.classList.add('zoomed-right');
                    }
                } else {
                    flipNext();
                }
            } else {
                if (isZoomed) {
                    if (book.classList.contains('zoomed-right')) {
                        book.classList.remove('zoomed-right');
                        book.classList.add('zoomed-left');
                    }
                } else {
                    flipPrev();
                }
            }
        }
    } else {
        if (absDiffY > swipeThreshold) {
            if (diffY < 0) {
                if (isZoomed) {
                    book.classList.remove('zoomed-left', 'zoomed-right');
                }
            }
        }
    }
}
