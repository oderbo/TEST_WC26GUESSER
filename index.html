<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>WC26 Guesser & Album</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<style>
* {
    box-sizing: border-box;
}

html, body {
    text-size-adjust: none;
    -webkit-text-size-adjust: none;
}

body { 
    margin: 0; 
    padding: 20px;
    font-family: Arial, sans-serif; 
    color: white; 
    background-color: #3f57f5;
    
    display: flex; 
    align-items: center; 
    flex-direction: column; 
    
    height: 100dvh;
    min-height: 100dvh;
    width: 100%;
    overflow: hidden;
    position: relative;
}

/* --- HEADER WRAPPER --- */
.header-container {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo-mask {
    width: 100%;
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: top center;
    
    background: linear-gradient(
        135deg, 
        #bf953f 0%, 
        #fcf6ba 25%, 
        #b38728 50%, 
        #fbf5b7 75%, 
        #aa771c 100%
    );
    background-size: 400% 400%;
    animation: goldGlow 8s ease infinite;
}

.center-space { display: none; }

/* --- DESKTOP & TABLET LAYOUT --- */
@media (min-width: 768px) {
    body { justify-content: flex-start; }

    .center-bg-icon-desktop {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        width: 35vw; max-width: 500px; aspect-ratio: 1 / 1;
        background-image: url('assets/Icon.png'); background-size: contain;
        background-repeat: no-repeat; background-position: center; z-index: -1; opacity: 0.8;
    }

    .header-container { margin-top: 3vh; }

    .logo-desktop {
        display: block; max-width: 900px; width: 70vw; aspect-ratio: 3 / 1; 
        -webkit-mask-image: url('assets/WC26Guesser.svg'); mask-image: url('assets/WC26Guesser.svg');
    }
    
    .logo-mobile { display: none; }

    .menu-container {
        position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
        display: flex; flex-direction: row; justify-content: center; align-items: center;
        width: 100%; max-width: 1400px; gap: 2.5vw; z-index: 10; padding: 0 20px;
    }

    .image-btn { width: 13vw; max-width: 160px; }
    .center-space { display: block; width: 20vw; max-width: 250px; aspect-ratio: 1 / 1; visibility: hidden; }

    .booster-zone {
        position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%);
        margin: 0; z-index: 11; width: 180px; height: 252px;
    }
}

/* --- MOBILE LAYOUT --- */
@media (max-width: 767px) {
    body { justify-content: flex-start; padding: 0 15px; }
    .center-bg-icon-desktop { display: none; }
    .header-container { margin-top: calc(env(safe-area-inset-top, 0px) + 15px); }
    .logo-desktop { display: none; }
    
    .logo-mobile {
        display: block; max-width: 260px; width: 65vw; aspect-ratio: 1.2 / 1; 
        -webkit-mask-image: url('assets/WC_26_GUESSER.svg'); mask-image: url('assets/WC_26_GUESSER.svg');
    }

    .menu-container {
        display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; 
        justify-items: center; align-items: center; max-width: 250px; width: 100%;
        margin-top: 5vh;    
        margin-bottom: 5vh; 
        margin-left: auto;   
        margin-right: auto;  
        
        z-index: 10; flex-shrink: 0;
    }

    .image-btn { width: 28vw; max-width: 105px; }

    .booster-zone {
        display: none; flex-direction: column; align-items: center; justify-content: center;
        position: relative; z-index: 12; flex-shrink: 0; margin-top: 0;
        margin-bottom: calc(env(safe-area-inset-bottom, 0px) + 4vw);
        width: 140px; height: 196px;
        background-image: url('assets/Icon.png'); background-size: contain;
        background-repeat: no-repeat; background-position: center;
    }
}

@keyframes goldGlow {
    0% { background-position: 0% 50%; filter: drop-shadow(0 0 4px rgba(251, 245, 183, 0.4)); }
    50% { background-position: 100% 50%; filter: drop-shadow(0 0 12px rgba(251, 245, 183, 0.85)); }
    100% { background-position: 0% 50%; filter: drop-shadow(0 0 4px rgba(251, 245, 183, 0.4)); }
}

/* --- IMAGE BUTTON SYSTEM --- */
.image-btn {
    background-size: cover; background-position: center; background-repeat: no-repeat;
    border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 14px; cursor: pointer; 
    transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    aspect-ratio: 1 / 1; padding: 0;
}

.image-btn:hover:not(:disabled) { transform: translateY(-4px); box-shadow: 0 8px 25px rgba(0, 255, 204, 0.4); border-color: #00ffcc; }
.image-btn:active:not(:disabled) { transform: translateY(1px); }

.image-btn:disabled {
    opacity: 0.4;
    filter: grayscale(1);
    cursor: not-allowed;
}

.btn-random-nation { background-image: url('assets/country_random_button.jpg'); }
.btn-pick-nation { background-image: url('assets/country_pick_button.jpg'); }
.btn-player-random { background-image: url('assets/player_random_button.png'); position: relative; }
.btn-album { background-image: url('assets/album_button.png'); }

/* --- TOP 10 BADGE STYLE --- */
.top10-badge {
    position: absolute; top: 0; right: 0; background-color: #ffffff; 
    border-left: 1px solid rgba(0, 0, 0, 0.1); border-bottom: 1px solid rgba(0, 0, 0, 0.1);
